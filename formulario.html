<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <h1>Perfil</h1>

  <!-- NAV -->
  <nav>
    <button id="incio">Inicio</button>
    <button id="galeria">Galeria Smash Bros</button>
    <a href="#">Contacto</a>
  </nav>
</header>

<!-- ===== MAIN ===== -->
<main>

  <!-- HERO -->
  <section class="hero">
    <h2>Bienvenido</h2>
    <p>HTML, CSS y JS</p>
    <button id="btn">Click</button>
  </section>

  <!-- ARTICLE -->
  <article>
    <h2>Artículo</h2>
    <p>agregando funcion </p>
  </article>

  <!-- ASIDE -->
  <aside>
    <h3>Información extra</h3>
    
    <p>Contenido secundario.</p>
  </aside>

  <!-- LISTA -->
  <section>
    <h2>Tecnologías</h2>
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </section>

  <!-- GALERÍA -->
  <section>
    <h2>Galería</h2>
    <div class="galeria">
      <img src="img/kirby.png">
      <img src="img/link.png">
      <img src="img/samus.png">
    </div>
  </section>

  <!-- FLEXBOX -->
  <section>
    <h2>Flexbox</h2>
    <div class="flex">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>
  </section>

  <!-- GRID -->
  <section>
    <h2>Grid</h2>
    <div class="grid">
      <div class="box">A</div>
      <div class="box">B</div>
      <div class="box">C</div>
    </div>
  </section>

  <!-- TABLA -->
  <section id="tabla">
    <h2>Tabla</h2>
    <table>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
      </tr>
      <tr>
        <td>Jonathan</td>
        <td>20</td>
      </tr>
    </table>
  </section>

  <!-- FORMULARIO -->
  <section class="formulario">
    <h2>Formulario</h2>
    <form>
      <label>Nombre:</label>
      <input type="text">

      <label>Email:</label>
      <input type="email">

      <button type="submit">Enviar</button>
    </form>
  </section>

</main>

<!-- ===== FOOTER ===== -->
<footer>
  <p>© 2026 probando html ,css y javascript</p>
</footer>

<script src="script3.js"></script>
</body>
</html>
